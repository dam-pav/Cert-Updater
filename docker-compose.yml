# DUCKDNS_TOKEN=xxxx
# CF_API_TOKEN=yyyy
# CF_ACCOUNT_ID=zzzz
# DATA_DIR
# CERT_UID
# CERT_GID
# ACME_ACCOUNT_EMAIL
# SYNC_INTERVAL_SECONDS
# WEB_PORT (default: 8080)

version: "3.9"

services:
  cert-updater-init:
    image: alpine:3.20
    container_name: cert-updater-init
    user: "0:0"
    restart: "no"
  
    volumes:
      - ${DATA_DIR}:/data

    command: >
      sh -c '
        set -eu
        
        # Install openssh for ssh-keygen
        apk add --no-cache openssh-keygen

        cert_base="/data/cert-updater"

        echo "Checking /data mount..."
        if [ ! -d "/data" ]; then
          echo "ERROR: /data is not mounted"
          exit 1
        fi

        echo "Using base directory: $$cert_base"
        if [ -z "$$cert_base" ]; then
          echo "ERROR: Cert base is empty"
          exit 1
        fi

        echo "Creating directories under $$cert_base"
        mkdir -p "$$cert_base" || true
        mkdir -p \
          "$$cert_base/state" \
          "$$cert_base/config" \
          "$$cert_base/ssh" \
          "$$cert_base/ssh-runtime" \
          "$$cert_base/export" || true
        echo "Adjusting ownership and permissions"
        chown -R ${CERT_UID}:${CERT_GID} "$$cert_base" || true
        chmod 700 "$$cert_base/ssh" || true

        # Generate SSH key if it does not exist
        if [ ! -f "$$cert_base/ssh/id_ed25519" ]; then
          echo "Generating SSH key..."
          ssh-keygen -t ed25519 -f "$$cert_base/ssh/id_ed25519" -N "" -C "cert-updater"
          chown ${CERT_UID}:${CERT_GID} "$$cert_base/ssh/id_ed25519" "$$cert_base/ssh/id_ed25519.pub"
          chmod 600 "$$cert_base/ssh/id_ed25519"
          chmod 644 "$$cert_base/ssh/id_ed25519.pub"
          echo ""
          echo "=========================================="
          echo "NEW SSH KEY GENERATED"
          echo "Add this public key to your target hosts:"
          echo "=========================================="
          cat "$$cert_base/ssh/id_ed25519.pub"
          echo "=========================================="
          echo ""
        fi

        echo "acme init completed successfully"
      '

  cert-updater:
    image: ghcr.io/dam-pav/cert-updater:latest
    container_name: cert-updater
    user: "${CERT_UID}:${CERT_GID}"
    restart: unless-stopped

    depends_on:
      cert-updater-init:
        condition: service_completed_successfully

    volumes:
      - ${DATA_DIR}/cert-updater/state:/cert-updater/state
      - ${DATA_DIR}/cert-updater/config:/cert-updater/config
      - ${DATA_DIR}/cert-updater/export:/cert-updater/export
      - ${DATA_DIR}/cert-updater/ssh:/cert-updater/home/.ssh:ro
      - ${DATA_DIR}/cert-updater/ssh-runtime:/cert-updater/home/.ssh-runtime

    environment:
      TZ: Europe/Ljubljana
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-86400}
      ACME_ACCOUNT_EMAIL: ${ACME_ACCOUNT_EMAIL:-}
      CF_API_TOKEN: ${CF_API_TOKEN:-}
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID:-}
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN:-}

  cert-updater-web:
    image: nginx:alpine
    container_name: cert-updater-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ${DATA_DIR}/cert-updater/export:/usr/share/nginx/html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - cert-updater
