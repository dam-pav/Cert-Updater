# DUCKDNS_TOKEN=xxxx
# CF_API_TOKEN=yyyy
# CF_ACCOUNT_ID=zzzz
# DATA_DIR
# ACME_UID
# ACME_GID
# ACME_ACCOUNT_EMAIL

version: "3.9"

services:
  acme-init:
    image: alpine:3.20
    container_name: acme-init
    user: "0:0"
    restart: "no"
  
    volumes:
      - ${DATA_DIR}:/data

    command: >
      sh -c '
        set -eu
        acme_base="/data/acme"

        echo "Checking /data mount..."
        if [ ! -d "/data" ]; then
          echo "ERROR: /data is not mounted"
          exit 1
        fi

        echo "Using base directory: $$acme_base"
        if [ -z "$$acme_base" ]; then
          echo "ERROR: ACME base is empty"
          exit 1
        fi

        echo "Creating ACME directories under $$acme_base"
        mkdir -p "$$acme_base" || true
        mkdir -p \
          "$$acme_base/state" \
          "$$acme_base/config" \
          "$$acme_base/ssh" \
          "$$acme_base/ssh-runtime" \
          "$$acme_base/export" \
          "$$acme_base/logs" || true
        echo "Adjusting ownership and permissions"
        chown -R ${ACME_UID}:${ACME_GID} "$$acme_base" || true
        chmod 700 "$$acme_base/ssh" || true

        # Generate SSH key if it does not exist
        if [ ! -f "$$acme_base/ssh/id_ed25519" ]; then
          echo "Generating SSH key..."
          ssh-keygen -t ed25519 -f "$$acme_base/ssh/id_ed25519" -N "" -C "acme-worker"
          chown ${ACME_UID}:${ACME_GID} "$$acme_base/ssh/id_ed25519" "$$acme_base/ssh/id_ed25519.pub"
          chmod 600 "$$acme_base/ssh/id_ed25519"
          chmod 644 "$$acme_base/ssh/id_ed25519.pub"
          echo ""
          echo "=========================================="
          echo "NEW SSH KEY GENERATED"
          echo "Add this public key to your target hosts:"
          echo "=========================================="
          cat "$$acme_base/ssh/id_ed25519.pub"
          echo "=========================================="
          echo ""
        fi

        echo "acme init completed successfully"
      '

  acme-worker:
    image: ghcr.io/dam-pav/acme-worker:latest
    container_name: acme-worker
    user: "${ACME_UID}:${ACME_GID}"
    restart: unless-stopped

    depends_on:
      acme-init:
        condition: service_completed_successfully

    volumes:
      - ${DATA_DIR}/acme/state:/acme/state
      - ${DATA_DIR}/acme/config:/acme/config
      - ${DATA_DIR}/acme/export:/acme/export
      - ${DATA_DIR}/acme/ssh:/acme/home/.ssh:ro
      - ${DATA_DIR}/acme/ssh-runtime:/acme/home/.ssh-runtime
      - ${DATA_DIR}/acme/logs:/var/log/cron

    environment:
      TZ: Europe/Ljubljana
      ACME_ACCOUNT_EMAIL: ${ACME_ACCOUNT_EMAIL}
      CF_API_TOKEN: ${CF_API_TOKEN}
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID}
