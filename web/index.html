<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link id="settingsSchemaAsset" rel="schema" href="settings.schema.json" type="application/json">
    <title>Certificate Updater Status</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-card: #eef4fb;
            --text-primary: #172033;
            --text-secondary: #64748b;
            --accent: #005dff;
            --accent-muted: #2563eb;
            --accent-glow: rgba(0, 93, 255, 0.1);
            --border: #d5e0ee;
            --status-valid: #16a34a;
            --status-expired: #dc2626;
            --status-unknown: #d97706;
            --radius: 12px;
            --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            text-align: left;
            margin-bottom: 2rem;
        }

        header h1 {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0;
            line-height: 1.15;
        }

        .title-logo {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            box-shadow: 0 8px 18px rgba(0, 93, 255, 0.16);
        }

        .last-sync {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-secondary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            white-space: nowrap;
        }

        .last-sync .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .subpage-tabs {
            display: flex;
            align-items: flex-end;
            gap: 0.25rem;
            margin-bottom: -1px;
            padding-left: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .subpage-tab {
            position: relative;
            min-width: 8rem;
            background: #f3f7fc;
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            padding: 0.7rem 1rem;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .subpage-tab:hover {
            color: var(--text-primary);
            border-color: var(--accent);
        }

        .subpage-tab.active {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--border);
            z-index: 1;
        }

        .subpage {
            display: none;
        }

        .subpage.active {
            display: block;
        }

        .table-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0 var(--radius) var(--radius) var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg-card);
        }

        th {
            padding: 1rem 1.25rem;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem 1.25rem;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(213, 224, 238, 0.8);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: rgba(0, 93, 255, 0.04);
        }

        .domain-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .host-tag {
            display: inline-block;
            background: var(--accent-glow);
            color: var(--accent);
            padding: 0.25rem 0.65rem;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 500;
        }

        .transfer-badge {
            display: inline-block;
            background: rgba(34, 197, 94, 0.15);
            color: var(--status-valid);
            padding: 0.25rem 0.65rem;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .command-text {
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.82rem;
            line-height: 1.5;
            overflow-wrap: anywhere;
        }

        .provider-badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.12);
            color: #4f46e5;
            padding: 0.25rem 0.65rem;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 500;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.75rem;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .status-badge.valid {
            background: rgba(34, 197, 94, 0.15);
            color: var(--status-valid);
        }

        .status-badge.expired {
            background: rgba(239, 68, 68, 0.15);
            color: var(--status-expired);
        }

        .status-badge.unknown {
            background: rgba(245, 158, 11, 0.15);
            color: var(--status-unknown);
        }

        .status-badge .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .status-badge.valid .status-dot { background: var(--status-valid); }
        .status-badge.expired .status-dot { background: var(--status-expired); }
        .status-badge.unknown .status-dot { background: var(--status-unknown); }

        .datetime {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-variant-numeric: tabular-nums;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            text-align: center;
            padding: 2rem;
            color: var(--status-expired);
            background: rgba(239, 68, 68, 0.08);
            border-radius: var(--radius);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            header {
                align-items: flex-start;
                flex-direction: column;
                gap: 1rem;
            }
            th, td { padding: 0.75rem 0.75rem; }
            .subpage-tab {
                flex: 1;
                min-width: 0;
            }
            table { font-size: 0.85rem; }
        }

        @media (max-width: 500px) {
            .hide-mobile { display: none; }
        }

        /* ── Menu & Editor Modal ── */
        .menu-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }

        .menu-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.2s, border-color 0.2s;
        }

        .menu-btn:hover {
            background: var(--bg-card);
            border-color: var(--accent);
        }

        .menu-btn svg {
            width: 18px;
            height: 18px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.35);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 100%;
            max-width: 900px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            display: flex;
            align-items: center;
        }

        .modal-close:hover {
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .modal-close svg {
            width: 20px;
            height: 20px;
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
        }

        .editor-toolbar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .editor-toolbar button {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            transition: background 0.2s, border-color 0.2s;
        }

        .editor-toolbar button:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .editor-toolbar button.primary {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
            font-weight: 600;
        }

        .editor-toolbar button.primary:hover {
            background: var(--accent-muted);
        }

        .editor-toolbar button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .editor-wrapper {
            position: relative;
            width: 100%;
            height: clamp(400px, 58vh, 640px);
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
            --editor-font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            /* Ensure consistent box model */
            -webkit-text-size-adjust: none;
            -moz-text-size-adjust: none;
            text-size-adjust: none;
        }

        .editor-wrapper:focus-within {
            border-color: var(--accent);
        }

        .editor-highlight {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            font-family: var(--editor-font);
            font-size: 0.85rem;
            font-weight: 400;
            font-style: normal;
            line-height: 1.6;
            letter-spacing: 0;
            padding: 1rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            pointer-events: none;
            overflow: hidden;
            tab-size: 2;
            margin: 0;
            border: none;
            background: transparent;
            color: var(--text-primary);
            box-sizing: border-box;
            font-kerning: none;
            font-variant-ligatures: none;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .editor-highlight-content {
            display: block;
            min-height: 100%;
            font: inherit;
            white-space: inherit;
            background: transparent;
            color: inherit;
        }

        .editor-highlight span {
            font: inherit;
            background: transparent;
        }

        /* Plain YAML text that is not a schema token still needs to remain readable. */
        .editor-highlight .hl-uncolored {
            color: var(--text-primary);
        }

        .editor-textarea {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: transparent;
            -webkit-text-fill-color: transparent;
            font-family: var(--editor-font);
            font-size: 0.85rem;
            font-weight: 400;
            font-style: normal;
            line-height: 1.6;
            letter-spacing: 0;
            padding: 1rem;
            margin: 0;
            resize: none;
            outline: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            overflow: auto;
            tab-size: 2;
            caret-color: var(--accent);
            z-index: 1;
            font-kerning: none;
            font-variant-ligatures: none;
            /* Remove default textarea styling */
            border-radius: 0;
            box-shadow: none;
            -webkit-appearance: none;
            appearance: none;
            box-sizing: border-box;
        }

        .editor-textarea::selection {
            background: rgba(0, 93, 255, 0.18);
        }

        .editor-textarea::placeholder {
            color: var(--text-secondary);
            -webkit-text-fill-color: var(--text-secondary);
        }

        /* Syntax highlight colors */
        .editor-highlight .hl-key-valid {
            color: #047857;
        }
        .editor-highlight .hl-val-valid { color: #1d4ed8; }
        .editor-highlight .hl-key-invalid { color: var(--text-primary); }    /* invalid key, marked by underline */
        .editor-highlight .hl-val-invalid { color: var(--text-primary); }    /* invalid value, marked by underline */
        .hl-error-symbol {
            background: transparent;
            text-decoration-line: underline;
            text-decoration-style: wavy;
            text-decoration-color: #ef4444;
            text-decoration-thickness: 1.5px;
            text-underline-offset: 3px;
        }
        .editor-highlight .hl-comment { color: #64748b; } /* comments */
        .editor-highlight .hl-string { color: #1d4ed8; }           /* blue strings */
        .editor-highlight .hl-anchor { color: #7c3aed; }           /* purple YAML anchors/aliases */
        .editor-highlight .hl-directive { color: #4f46e5; }        /* YAML directives */
        .editor-highlight .hl-tag { color: #b45309; }              /* YAML tags */
        .editor-highlight .hl-null { color: #be185d; }             /* null values */
        .editor-highlight .hl-bool { color: #c2410c; }             /* booleans */
        .editor-highlight .hl-colon { color: #94a3b8; } /* colon separator */
        .editor-highlight .hl-dash { color: #94a3b8; }  /* list dash */

        @media (max-width: 768px) {
            .editor-wrapper {
                height: 55vh;
                min-height: 320px;
            }
        }

        .validation-status {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
        }

        .validation-status.visible {
            display: block;
        }

        .validation-status.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--status-valid);
        }

        .validation-status.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--status-expired);
        }

        .validation-status .error-list {
            margin-top: 0.5rem;
            padding-left: 1.2rem;
        }

        .validation-status .error-list li {
            margin-bottom: 0.25rem;
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        .modal-footer button {
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .modal-footer .btn-cancel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .modal-footer .btn-cancel:hover {
            background: var(--bg-secondary);
        }

        .modal-footer .btn-save {
            background: var(--accent);
            border: 1px solid var(--accent);
            color: var(--bg-primary);
            font-weight: 600;
        }

        .modal-footer .btn-save:hover {
            background: #7dd3fc;
        }

        .modal-footer .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .loading-indicator .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <img class="title-logo" src="dam-pav.logo.svg" alt="DAM PAV">
                Certificate Updater Status
            </h1>
            <div class="last-sync" id="lastSync">
                <span class="dot"></span>
                <span>Loading...</span>
            </div>
        </header>

        <div class="menu-bar">
            <button class="menu-btn" onclick="openSettingsEditor()" title="Edit settings.yml">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                Edit Settings
            </button>
        </div>

        <div class="subpage-tabs" role="tablist" aria-label="Dashboard views">
            <button class="subpage-tab active" id="domainsTab" role="tab" aria-selected="true" aria-controls="domainsPage" onclick="switchSubpage('domains')">Domains</button>
            <button class="subpage-tab" id="hostsTab" role="tab" aria-selected="false" aria-controls="hostsPage" onclick="switchSubpage('hosts')">Hosts</button>
        </div>

        <div class="subpage active" id="domainsPage" role="tabpanel" aria-labelledby="domainsTab">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Domain</th>
                            <th>Host</th>
                            <th class="hide-mobile">Provider</th>
                            <th>Status</th>
                            <th class="hide-mobile">Last Checked</th>
                            <th>Last Updated</th>
                            <th>Next Update</th>
                        </tr>
                    </thead>
                    <tbody id="domainTable">
                        <tr>
                            <td colspan="7">
                                <div class="loading">
                                    <div class="spinner"></div>
                                    Loading certificate status...
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="subpage" id="hostsPage" role="tabpanel" aria-labelledby="hostsTab">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Host</th>
                            <th>URL</th>
                            <th>Transfer</th>
                            <th>Domains</th>
                            <th class="hide-mobile">Reload</th>
                        </tr>
                    </thead>
                    <tbody id="hostTable">
                        <tr>
                            <td colspan="5">
                                <div class="loading">
                                    <div class="spinner"></div>
                                    Loading host configuration...
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Settings Editor Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="modal-close" onclick="closeSettingsEditor()" title="Close">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M18 6 6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="editor-toolbar">
                    <button onclick="formatYaml()" title="Pretty-print YAML">Format</button>
                    <button onclick="copyEditorContent()" title="Copy to clipboard">Copy</button>
                    <button onclick="pasteEditorContent()" title="Paste from clipboard">Paste</button>
                    <button onclick="loadSettings()" id="reloadBtn">Reload</button>
                    <span id="editorStatus" style="margin-left:auto;"></span>
                </div>
                <div class="editor-wrapper" id="editorWrapper">
                    <pre class="editor-highlight" id="editorHighlight" aria-hidden="true"><code class="editor-highlight-content" id="editorHighlightContent"></code></pre>
                    <textarea class="editor-textarea" id="settingsEditor" placeholder="Loading settings.yml..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-gramm="false" data-gramm_editor="false" data-enable-grammarly="false"></textarea>
                </div>
                <div class="validation-status" id="validationStatus"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeSettingsEditor()">Cancel</button>
                <button class="btn-save" id="saveBtn" onclick="saveSettings()" disabled>Save</button>
            </div>
        </div>
    </div>

    <script>
        function escapeHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function formatDateTime(timestamp) {
            if (!timestamp) return '—';
            const d = new Date(timestamp + 'Z');
            if (isNaN(d)) return timestamp;
            return d.toLocaleString('en-US', {
                year: 'numeric', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false, timeZone: 'UTC'
            }) + ' UTC';
        }

        function switchSubpage(page) {
            const isHosts = page === 'hosts';
            document.getElementById('domainsPage').classList.toggle('active', !isHosts);
            document.getElementById('hostsPage').classList.toggle('active', isHosts);
            document.getElementById('domainsTab').classList.toggle('active', !isHosts);
            document.getElementById('hostsTab').classList.toggle('active', isHosts);
            document.getElementById('domainsTab').setAttribute('aria-selected', String(!isHosts));
            document.getElementById('hostsTab').setAttribute('aria-selected', String(isHosts));
        }

        function renderTable(domains) {

            if (!domains.length) {
                tbody.innerHTML = `

            tbody.innerHTML = domains.map(d => `
                <tr>

        function renderHostsTable(hosts) {

                                <path d="M7.5 7.5h.01M7.5 16.5h.01"/>
                            </svg>
                            <p>No hosts configured</p>
                        </div>
                    </td></tr>`;
                return;

            tbody.innerHTML = hosts.map(h => `
                <tr>
                    <td><span class="host-tag">${escapeHtml(h.name || '—')}</span></td>

                    <td>${Number.isFinite(Number(h.domain_count)) ? Number(h.domain_count) : 0}</td>
                    <td class="command-text hide-mobile">${escapeHtml(h.reload || '—')}</td>
                </tr>

        }

        async function loadStatus() {
            try {
                const res = await fetch('status.json?t=' + Date.now());
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                const syncEl = document.getElementById('lastSync');
                syncEl.innerHTML = `<span class="dot"></span><span>Last sync: ${formatDateTime(data.last_sync)}</span>`;

                renderTable(data.domains || []);
                renderHostsTable(data.hosts || []);
            } catch (err) {
                document.getElementById('domainTable').innerHTML = `
                    <tr><td colspan="7"><div class="error-msg">Failed to load status: ${err.message}<br><small>Ensure status.json is accessible at the same path as this page.</small></div></td></tr>`;

                    <tr><td colspan="5"><div class="error-msg">Failed to load hosts: ${err.message}</div></td></tr>`;

        loadStatus();
        setInterval(loadStatus, 60000);
    </script>

    <script>
    // ── JSON Schema for settings.yml validation ──
    let SETTINGS_SCHEMA = null;

    // ── Simple YAML parser (subset for validation) ──
    // Uses js-yaml loaded from CDN for robust parsing
    let yamlLoaded = false;
    let schemaLoadPromise = null;

    function loadYamlLibrary() {
        if (yamlLoaded) return Promise.resolve();
        return new Promise((resolve, reject) => {
            if (document.getElementById('js-yaml-script')) {
                yamlLoaded = true;
                resolve();
                return;
            }
            const script = document.createElement('script');
            script.id = 'js-yaml-script';
            script.src = 'https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js';
            script.onload = () => { yamlLoaded = true; resolve(); };
            script.onerror = () => reject(new Error('Failed to load YAML library'));
            document.head.appendChild(script);
        });
    }

    // ── Schema validation and highlighting ──
    const FREEFORM_OBJECT = { type: "object", additionalProperties: true };

    function loadSettingsSchema() {
        if (SETTINGS_SCHEMA) return Promise.resolve(SETTINGS_SCHEMA);
        if (schemaLoadPromise) return schemaLoadPromise;

        const schemaUrl = document.getElementById('settingsSchemaAsset').href;
        schemaLoadPromise = fetch(schemaUrl, { cache: 'no-store' })
            .then(res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                return res.json();
            })
            .then(schema => {
                SETTINGS_SCHEMA = schema;
                return SETTINGS_SCHEMA;
            })
            .finally(() => {
                schemaLoadPromise = null;
            });

        return schemaLoadPromise;
    }

    function stripYamlQuotes(value) {
        const trimmed = value.trim();
        if ((trimmed.startsWith('"') && trimmed.endsWith('"')) || (trimmed.startsWith("'") && trimmed.endsWith("'"))) {
            return trimmed.slice(1, -1);
        }
        return trimmed;
    }

    function describeType(value) {
        if (Array.isArray(value)) return 'array';
        if (value === null) return 'null';
        return typeof value;
    }

    function splitPath(path) {
        if (!path) return [];
        const parts = [];
        path.split('.').forEach(part => {
            const re = /([^\[\]]+)|\[(\d+)\]/g;
            let match;
            while ((match = re.exec(part))) {
                parts.push(match[1] ?? Number(match[2]));
            }
        });
        return parts;
    }

    function getSchemaAtPath(schema, path) {
        let current = schema;
        for (const part of splitPath(path)) {
            if (!current) return null;
            if (typeof part === 'number') {
                current = current.type === 'array' ? current.items : null;
            } else if (current.type === 'array') {
                current = current.items && current.items.properties ? current.items.properties[part] : null;
            } else if (current.properties && current.properties[part]) {
                current = current.properties[part];
            } else if (current.additionalProperties && typeof current.additionalProperties === 'object') {
                current = current.additionalProperties;
            } else if (current.additionalProperties === true) {
                current = FREEFORM_OBJECT;
            } else {
                return null;
            }
        }
        return current;
    }

    function getAllowedChildSchema(parentSchema, keyName) {
        if (!parentSchema) return { schema: null, dynamic: false };
        const objectSchema = parentSchema.type === 'array' ? parentSchema.items : parentSchema;

        if (objectSchema.properties && objectSchema.properties[keyName]) {
            return { schema: objectSchema.properties[keyName], dynamic: false };
        }
        if (objectSchema.additionalProperties === true) {
            return { schema: FREEFORM_OBJECT, dynamic: true };
        }
        if (objectSchema.additionalProperties && typeof objectSchema.additionalProperties === 'object') {
            return { schema: objectSchema.additionalProperties, dynamic: true };
        }
        return { schema: null, dynamic: false };
    }

    function isPlainObject(value) {
        return value !== null && typeof value === 'object' && !Array.isArray(value);
    }

    function validateAgainstSchema(data, schema, path = '') {
        const errors = [];
        const location = path || 'root';

        if (schema.type) {
            const actualType = describeType(data);
            if (actualType !== schema.type) {
                errors.push({ path, kind: 'value', message: `${location}: expected ${schema.type}, got ${actualType}` });
                return errors;
            }
        }

        if (schema.enum && !schema.enum.includes(data)) {
            errors.push({
                path,
                kind: 'value',
                message: `${location}: value must be one of ${schema.enum.join(', ')}`
            });
        }

        if (schema.type === 'object' && isPlainObject(data)) {
            for (const field of schema.required || []) {
                if (!(field in data)) {
                    errors.push({
                        path: path ? `${path}.${field}` : field,
                        parentPath: path,
                        kind: 'missing',
                        message: `${path ? `${path}.` : ''}${field}: required field is missing`
                    });
                }
            }

            for (const [key, value] of Object.entries(data)) {
                const child = getAllowedChildSchema(schema, key);
                const childPath = path ? `${path}.${key}` : key;

                if (!child.schema) {
                    errors.push({
                        path: childPath,
                        kind: 'key',
                        message: `${childPath}: unknown schema key`
                    });
                    continue;
                }

                if (child.schema !== FREEFORM_OBJECT || !child.dynamic) {
                    errors.push(...validateAgainstSchema(value, child.schema, childPath));
                }
            }
        }

        if (schema.type === 'array' && Array.isArray(data) && schema.items) {
            data.forEach((item, index) => {
                errors.push(...validateAgainstSchema(item, schema.items, `${path}[${index}]`));
            });
        }

        return errors;
    }

    function validateSettingsReferences(data) {
        const errors = [];
        if (!Array.isArray(data.domains)) return errors;

        const hostNames = isPlainObject(data.hosts) ? new Set(Object.keys(data.hosts)) : new Set();
        data.domains.forEach((domain, index) => {
            if (!isPlainObject(domain) || typeof domain.host !== 'string') return;
            if (!hostNames.has(domain.host)) {
                errors.push({
                    path: `domains[${index}].host`,
                    kind: 'value',
                    message: hostNames.size
                        ? `domains[${index}].host: "${domain.host}" does not match any configured host`
                        : `domains[${index}].host: "${domain.host}" cannot be resolved because no hosts are configured`
                });
            }
        });

        return errors;
    }

    function validateYamlContent(yamlText) {
        if (!SETTINGS_SCHEMA) {
            return {
                valid: false,
                errors: [{
                    path: '',
                    kind: 'value',
                    message: `settings schema is not loaded from ${document.getElementById('settingsSchemaAsset').href}`
                }]
            };
        }

        let parsed;
        try {
            parsed = jsyaml.load(yamlText);
        } catch (e) {
            return {
                valid: false,
                parseError: e,
                errors: [{ kind: 'parse', message: `YAML parse error: ${e.message}`, mark: e.mark }]
            };
        }

        if (!isPlainObject(parsed)) {
            return {
                valid: false,
                errors: [{ path: '', kind: 'value', message: 'root: expected object, got ' + describeType(parsed) }]
            };
        }

        const errors = [
            ...validateAgainstSchema(parsed, SETTINGS_SCHEMA),
            ...validateSettingsReferences(parsed)
        ];
        return { valid: errors.length === 0, errors };
    }

    function parseKeyValue(text) {
        let quote = null;
        let bracketDepth = 0;
        for (let i = 0; i < text.length; i++) {
            const ch = text[i];
            const prev = text[i - 1];

            if (quote) {
                if (ch === quote && prev !== '\\') quote = null;
                continue;
            }

            if (ch === '"' || ch === "'") {
                quote = ch;
            } else if (ch === '[' || ch === '{') {
                bracketDepth++;
            } else if (ch === ']' || ch === '}') {
                bracketDepth = Math.max(0, bracketDepth - 1);
            } else if (ch === ':' && bracketDepth === 0) {
                const after = text[i + 1];
                if (after === undefined || /\s|#/.test(after)) {
                    return {
                        keyRaw: text.slice(0, i).trimEnd(),
                        keyStart: text.search(/\S/),
                        colonIndex: i,
                        valueRaw: text.slice(i + 1)
                    };
                }
            }
        }
        return null;
    }

    function findInlineCommentStart(text) {
        let quote = null;
        let bracketDepth = 0;

        for (let i = 0; i < text.length; i++) {
            const ch = text[i];
            const prev = text[i - 1];

            if (quote) {
                if (ch === quote && prev !== '\\') quote = null;
                continue;
            }

            if (ch === '"' || ch === "'") {
                quote = ch;
            } else if (ch === '[' || ch === '{') {
                bracketDepth++;
            } else if (ch === ']' || ch === '}') {
                bracketDepth = Math.max(0, bracketDepth - 1);
            } else if (ch === '#' && bracketDepth === 0 && (i === 0 || /\s/.test(prev))) {
                return i;
            }
        }

        return -1;
    }

    function buildEditorTokens(lines) {
        const tokensByLine = new Map();
        const stack = [];
        const arrayCounters = new Map();

        const addToken = (line, token) => {
            if (!tokensByLine.has(line)) tokensByLine.set(line, []);
            tokensByLine.get(line).push(token);
        };

        lines.forEach((line, lineIndex) => {
            const indent = (line.match(/^(\s*)/) || [''])[0].length;
            const trimmed = line.trimStart();
            if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('%')) return;

            while (stack.length && stack[stack.length - 1].indent >= indent) stack.pop();

            const parent = stack.length ? stack[stack.length - 1] : { path: '', schema: SETTINGS_SCHEMA };
            let contentStart = indent;
            let content = line.slice(indent);
            let listIndex = null;
            let itemPath = parent.path;
            let itemSchema = parent.schema;

            if (content.startsWith('- ')) {
                const counterKey = `${parent.path}|${indent}`;
                listIndex = arrayCounters.get(counterKey) || 0;
                arrayCounters.set(counterKey, listIndex + 1);
                contentStart += 2;
                content = content.slice(2);

                if (parent.schema && parent.schema.type === 'array') {
                    itemPath = `${parent.path}[${listIndex}]`;
                    itemSchema = parent.schema.items;
                    addToken(lineIndex, {
                        type: 'dash',
                        start: indent,
                        end: indent + 1,
                        path: itemPath
                    });
                    stack.push({ indent: indent + 1, path: itemPath, schema: itemSchema });
                }
            }

            const kv = parseKeyValue(content);
            if (!kv || !kv.keyRaw) return;

            const parentPath = listIndex === null ? parent.path : itemPath;
            const parentSchema = listIndex === null ? parent.schema : itemSchema;
            const keyClean = stripYamlQuotes(kv.keyRaw);
            const child = getAllowedChildSchema(parentSchema, keyClean);
            const childPath = parentPath ? `${parentPath}.${keyClean}` : keyClean;
            const valueLeading = kv.valueRaw.match(/^\s*/)[0].length;
            const valueText = kv.valueRaw.slice(valueLeading);
            const valueStart = contentStart + kv.colonIndex + 1 + valueLeading;

            addToken(lineIndex, {
                type: 'key',
                text: kv.keyRaw,
                start: contentStart + kv.keyStart,
                end: contentStart + kv.keyStart + kv.keyRaw.length,
                path: childPath,
                parentPath,
                schema: child.schema,
                schemaValid: Boolean(child.schema)
            });
            addToken(lineIndex, {
                type: 'colon',
                start: contentStart + kv.colonIndex,
                end: contentStart + kv.colonIndex + 1,
                path: childPath
            });

            if (valueText.trim()) {
                const valueTrimOffset = valueText.search(/\S/);
                const inlineComment = findInlineCommentStart(valueText);
                const semanticEnd = inlineComment >= 0 ? inlineComment : valueText.length;
                const visibleValue = valueText.slice(valueTrimOffset, semanticEnd).trimEnd();

                if (visibleValue) {
                    addToken(lineIndex, {
                        type: 'value',
                        text: visibleValue,
                        start: valueStart + valueTrimOffset,
                        end: valueStart + valueTrimOffset + visibleValue.length,
                        path: childPath,
                        schema: child.schema,
                        schemaValid: Boolean(child.schema)
                    });
                }

                if (inlineComment >= 0) {
                    addToken(lineIndex, {
                        type: 'comment',
                        start: valueStart + inlineComment,
                        end: line.length,
                        path: childPath
                    });
                }
            }

            if (child.schema && !valueText.trim()) {
                stack.push({ indent, path: childPath, schema: child.schema });
            }
        });

        return tokensByLine;
    }

    function errorIndexes(validation) {
        const keys = new Set();
        const values = new Set();

        (validation.errors || []).forEach(error => {
            if (error.kind === 'key') keys.add(error.path);
            if (error.kind === 'value') values.add(error.path);
        });

        return { keys, values };
    }

    function classForValue(text, schemaValid) {
        if (!schemaValid) return 'hl-uncolored';
        const value = text.trim();
        if ((value.startsWith('"') && value.endsWith('"')) || (value.startsWith("'") && value.endsWith("'"))) return 'hl-val-valid';
        if (/^(null|~)$/i.test(value)) return 'hl-null';
        if (/^(true|false|yes|no|on|off)$/i.test(value)) return 'hl-bool';
        if (value.startsWith('&') || value.startsWith('*')) return 'hl-anchor';
        if (value.startsWith('!')) return 'hl-tag';
        return 'hl-val-valid';
    }

    function wrapToken(text, className, isError = false) {
        const classes = isError ? `${className} hl-error-symbol` : className;
        return `<span class="${classes}">${escapeHtml(text)}</span>`;
    }

    function renderLine(line, tokens, lineIndex, validation, indexes) {
        const trimmed = line.trimStart();
        if (!trimmed) return '';
        if (trimmed.startsWith('#')) return `<span class="hl-comment">${escapeHtml(line)}</span>`;
        if (trimmed.startsWith('%')) return `<span class="hl-directive">${escapeHtml(line)}</span>`;

        const parseMark = validation.parseError && validation.errors[0]?.mark;
        if (parseMark && parseMark.line === lineIndex) {
            const column = Math.max(0, Math.min(line.length - 1, parseMark.column || 0));
            return [
                `<span class="hl-uncolored">${escapeHtml(line.slice(0, column))}</span>`,
                wrapToken(line[column] || ' ', 'hl-uncolored', true),
                `<span class="hl-uncolored">${escapeHtml(line.slice(column + 1))}</span>`
            ].join('');
        }

        if (!tokens || !tokens.length) return `<span class="hl-uncolored">${escapeHtml(line)}</span>`;

        let cursor = 0;
        let result = '';
        tokens.sort((a, b) => a.start - b.start).forEach(token => {
            if (token.start > cursor) {
                result += `<span class="hl-uncolored">${escapeHtml(line.slice(cursor, token.start))}</span>`;
            }

            const raw = line.slice(token.start, token.end);
            if (token.type === 'key') {
                const isError = indexes.keys.has(token.path);
                const className = token.schemaValid ? 'hl-key-valid' : 'hl-key-invalid';
                result += wrapToken(raw, className, isError);
            } else if (token.type === 'value') {
                const isError = indexes.values.has(token.path);
                const className = classForValue(raw, token.schemaValid);
                result += wrapToken(raw, className, isError);
            } else if (token.type === 'colon') {
                result += wrapToken(raw, 'hl-colon');
            } else if (token.type === 'dash') {
                result += wrapToken(raw, 'hl-dash');
            } else if (token.type === 'comment') {
                result += wrapToken(raw, 'hl-comment');
            }

            cursor = token.end;
        });

        if (cursor < line.length) {
            result += `<span class="hl-uncolored">${escapeHtml(line.slice(cursor))}</span>`;
        }
        return result;
    }

    function updateHighlighting(validation = null) {
        const editor = document.getElementById('settingsEditor');
        const highlightContent = document.getElementById('editorHighlightContent');
        const text = editor.value;
        const lines = text.split('\n');
        const currentValidation = validation || validateYamlContent(text);
        const tokensByLine = buildEditorTokens(lines);
        const indexes = errorIndexes(currentValidation);

        highlightContent.innerHTML = lines
            .map((line, idx) => renderLine(line, tokensByLine.get(idx), idx, currentValidation, indexes))
            .join('\n') + '\n';

        syncScroll();
    }

    // Sync scroll between textarea and highlight layer
    function syncScroll() {
        const editor = document.getElementById('settingsEditor');
        const highlightContent = document.getElementById('editorHighlightContent');
        highlightContent.style.transform = `translate(${-editor.scrollLeft}px, ${-editor.scrollTop}px)`;
    }

    function stripYamlMarkdownFence(text) {
        const lines = text.split('\n');
        const firstContent = lines.findIndex(line => line.trim());
        if (firstContent >= 0 && lines[firstContent].trim().startsWith('```')) {
            lines.splice(firstContent, 1);
        }

        let lastContent = -1;
        for (let index = lines.length - 1; index >= 0; index--) {
            if (lines[index].trim()) {
                lastContent = index;
                break;
            }
        }

        if (lastContent >= 0 && lines[lastContent].trim().startsWith('```')) {
            lines.splice(lastContent, 1);
        }

        return lines.join('\n').trim() + '\n';
    }

    async function loadPreviewSettingsExample() {
        const res = await fetch(`../config/settings.yml.example?t=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        return stripYamlMarkdownFence(await res.text());
    }

    // ── Editor functions ──
    async function openSettingsEditor() {
        const modal = document.getElementById('settingsModal');
        const editor = document.getElementById('settingsEditor');
        const status = document.getElementById('editorStatus');
        const saveBtn = document.getElementById('saveBtn');

        modal.classList.add('active');
        status.innerHTML = '<span class="loading-indicator"><span class="spinner"></span>Loading...</span>';
        saveBtn.disabled = true;

        try {
            await loadYamlLibrary();
            await loadSettingsSchema();
        } catch (err) {
            status.innerHTML = `<span style="color: var(--status-expired);">✗ ${err.message}</span>`;
            editor.value = '# Error opening settings editor\n# ' + err.message;
            updateHighlighting();
            return;
        }

        await loadSettings();
    }

    function closeSettingsEditor() {
        const modal = document.getElementById('settingsModal');
        modal.classList.remove('active');
        clearValidationStatus();
    }

    async function loadSettings() {
        const editor = document.getElementById('settingsEditor');
        const status = document.getElementById('editorStatus');
        const saveBtn = document.getElementById('saveBtn');

        status.innerHTML = '<span class="loading-indicator"><span class="spinner"></span>Loading...</span>';
        saveBtn.disabled = true;

        try {
            await loadYamlLibrary();
            await loadSettingsSchema();
        } catch (err) {
            status.innerHTML = `<span style="color: var(--status-expired);">✗ ${err.message}</span>`;
            editor.value = '# Error loading settings editor dependencies\n# ' + err.message;
            updateHighlighting();
            return;
        }

        try {
            const res = await fetch('/api/settings/read');
            if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
            const content = await res.text();
            editor.value = content;
            updateHighlighting();
            status.innerHTML = '<span style="color: var(--status-valid);">✓ Loaded</span>';
            validateAndEnableSave();
        } catch (err) {
            try {
                editor.value = await loadPreviewSettingsExample();
                await loadSettingsSchema();
                const validation = validateAndEnableSave();
                status.innerHTML = validation.valid
                    ? '<span style="color: var(--status-valid);">✓ Loaded example</span>'
                    : '<span style="color: var(--status-expired);">✗ Loaded example with validation errors</span>';
            } catch {
                status.innerHTML = `<span style="color: var(--status-expired);">✗ ${err.message}</span>`;
                editor.value = '# Error loading settings.yml\n# ' + err.message;
                updateHighlighting();
            }
        }
    }

    async function saveSettings() {
        const editor = document.getElementById('settingsEditor');
        const saveBtn = document.getElementById('saveBtn');
        const status = document.getElementById('editorStatus');

        // Validate before saving
        try {
            await loadSettingsSchema();
        } catch (err) {
            saveBtn.disabled = true;
            status.innerHTML = `<span style="color: var(--status-expired);">✗ Schema unavailable</span>`;
            showValidationStatus([{ message: `Cannot validate settings: ${err.message}` }], false);
            return;
        }

        const validation = validateYamlContent(editor.value);
        if (!validation.valid) {
            updateHighlighting(validation);
            showValidationStatus(validation.errors, false);
            return;
        }

        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';
        status.innerHTML = '<span class="loading-indicator"><span class="spinner"></span>Saving...</span>';

        try {
            const res = await fetch('/api/settings/write', {
                method: 'POST',
                headers: { 'Content-Type': 'text/yaml' },
                body: editor.value
            });

            const data = await res.json();

            if (!res.ok) {
                const detail = Array.isArray(data.details) ? `: ${data.details.join(', ')}` : '';
                throw new Error((data.error || `HTTP ${res.status}`) + detail);
            }

            showValidationStatus([data.message || 'Settings saved successfully!'], true);
            status.innerHTML = '<span style="color: var(--status-valid);">✓ Saved</span>';

            // Reload the dashboard data
            setTimeout(() => {
                loadStatus();
            }, 500);
        } catch (err) {
            showValidationStatus([err.message], false);
            status.innerHTML = `<span style="color: var(--status-expired);">✗ Save failed</span>`;
        } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save';
        }
    }

    function validateAndEnableSave() {
        const editor = document.getElementById('settingsEditor');
        const saveBtn = document.getElementById('saveBtn');
        const validation = validateYamlContent(editor.value);

        updateHighlighting(validation);
        saveBtn.disabled = !validation.valid;
        if (validation.valid) {
            clearValidationStatus();
        } else {
            showValidationStatus(validation.errors, false);
        }
        return validation;
    }

    function showValidationStatus(messages, isSuccess) {
        const el = document.getElementById('validationStatus');
        el.className = `validation-status visible ${isSuccess ? 'success' : 'error'}`;

        if (isSuccess) {
            el.innerHTML = messages.map(m => `<div>✓ ${escapeHtml(m.message || m)}</div>`).join('');
        } else {
            el.innerHTML = `<div>✗ Validation failed</div><ul class="error-list">${messages.map(m => `<li>${escapeHtml(m.message || m)}</li>`).join('')}</ul>`;
        }
    }

    function clearValidationStatus() {
        const el = document.getElementById('validationStatus');
        el.className = 'validation-status';
        el.innerHTML = '';
    }

    function getYamlLinePath(line, context) {
        const indent = (line.match(/^(\s*)/) || [''])[0].length;
        const trimmed = line.trimStart();
        if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('%')) return null;

        while (context.stack.length && context.stack[context.stack.length - 1].indent >= indent) {
            context.stack.pop();
        }

        const parent = context.stack.length ? context.stack[context.stack.length - 1] : { path: '', schema: SETTINGS_SCHEMA };
        let content = line.slice(indent);
        let listIndex = null;
        let itemPath = parent.path;
        let itemSchema = parent.schema;

        if (content.startsWith('- ')) {
            const counterKey = `${parent.path}|${indent}`;
            listIndex = context.arrayCounters.get(counterKey) || 0;
            context.arrayCounters.set(counterKey, listIndex + 1);
            content = content.slice(2);

            if (parent.schema && parent.schema.type === 'array') {
                itemPath = `${parent.path}[${listIndex}]`;
                itemSchema = parent.schema.items;
                context.stack.push({ indent: indent + 1, path: itemPath, schema: itemSchema });
            }
        }

        const kv = parseKeyValue(content);
        if (!kv || !kv.keyRaw) return itemPath || null;

        const parentPath = listIndex === null ? parent.path : itemPath;
        const parentSchema = listIndex === null ? parent.schema : itemSchema;
        const keyClean = stripYamlQuotes(kv.keyRaw);
        const child = getAllowedChildSchema(parentSchema, keyClean);
        const childPath = parentPath ? `${parentPath}.${keyClean}` : keyClean;
        const valueText = kv.valueRaw.trim();

        if (child.schema && !valueText) {
            context.stack.push({ indent, path: childPath, schema: child.schema });
        }

        return childPath;
    }

    function getYamlLinePaths(lines) {
        const context = { stack: [], arrayCounters: new Map() };
        return lines.map(line => getYamlLinePath(line, context));
    }

    function collectYamlComments(yamlText) {
        const lines = yamlText.split('\n');
        const linePaths = getYamlLinePaths(lines);
        const inline = new Map();
        const before = new Map();
        const trailing = [];
        let pending = [];

        lines.forEach((line, index) => {
            const trimmed = line.trimStart();
            const path = linePaths[index];

            if (!trimmed) {
                if (pending.length) pending.push(line);
                return;
            }

            if (trimmed.startsWith('#')) {
                pending.push(line);
                return;
            }

            if (path && pending.length) {
                if (!before.has(path)) before.set(path, []);
                before.get(path).push(...pending);
                pending = [];
            }

            if (!path) return;

            const commentStart = findInlineCommentStart(line);
            if (commentStart >= 0) {
                inline.set(path, line.slice(commentStart));
            }
        });

        if (pending.length) trailing.push(...pending);

        return { inline, before, trailing };
    }

    function addInlineComment(line, comment) {
        if (!comment || findInlineCommentStart(line) >= 0) return line;
        const padding = line.length < 28 ? ' '.repeat(28 - line.length) : '  ';
        return `${line}${padding}${comment.trimStart()}`;
    }

    function restoreYamlComments(formattedText, comments) {
        const lines = formattedText.replace(/\n$/, '').split('\n');
        const linePaths = getYamlLinePaths(lines);
        const output = [];

        lines.forEach((line, index) => {
            const path = linePaths[index];
            if (path && comments.before.has(path)) {
                output.push(...comments.before.get(path));
            }

            output.push(path && comments.inline.has(path)
                ? addInlineComment(line, comments.inline.get(path))
                : line);
        });

        if (comments.trailing.length) {
            if (output.length && output[output.length - 1].trim()) output.push('');
            output.push(...comments.trailing);
        }

        return output.join('\n') + '\n';
    }

    function formatYaml() {
        const editor = document.getElementById('settingsEditor');
        try {
            const comments = collectYamlComments(editor.value);
            const parsed = jsyaml.load(editor.value);
            const formatted = jsyaml.dump(parsed, {
                indent: 2,
                lineWidth: 120,
                noRefs: true,
                quotingType: '"',
                forceQuotes: false
            });
            editor.value = restoreYamlComments(formatted, comments);
            validateAndEnableSave();
        } catch (e) {
            alert('Cannot format: invalid YAML\n' + e.message);
        }
    }

    async function copyEditorContent() {
        const editor = document.getElementById('settingsEditor');
        try {
            await navigator.clipboard.writeText(editor.value);
            const status = document.getElementById('editorStatus');
            status.innerHTML = '<span style="color: var(--status-valid);">✓ Copied</span>';
            setTimeout(() => { status.innerHTML = ''; }, 2000);
        } catch {
            // Fallback
            editor.select();
            document.execCommand('copy');
        }
    }

    async function pasteEditorContent() {
        try {
            const text = await navigator.clipboard.readText();
            const editor = document.getElementById('settingsEditor');
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            editor.value = editor.value.substring(0, start) + text + editor.value.substring(end);
            editor.selectionStart = editor.selectionEnd = start + text.length;
            editor.focus();
            validateAndEnableSave();
        } catch {
            alert('Cannot paste: clipboard access denied. Use Ctrl+V directly.');
        }
    }

    // Close modal on overlay click
    document.getElementById('settingsModal').addEventListener('click', function(e) {
        if (e.target === this) closeSettingsEditor();
    });

    // Close modal on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const modal = document.getElementById('settingsModal');
            if (modal.classList.contains('active')) closeSettingsEditor();
        }
        // Tab support in textarea
        if (e.key === 'Tab' && document.activeElement.id === 'settingsEditor') {
            e.preventDefault();
            const editor = document.activeElement;
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
            editor.selectionStart = editor.selectionEnd = start + 2;
            validateAndEnableSave();
        }
    });

    // Validate on content change
    document.getElementById('settingsEditor').addEventListener('input', function() {
        validateAndEnableSave();
    });

    // Sync scroll on scroll
    document.getElementById('settingsEditor').addEventListener('scroll', syncScroll);
    </script>
</body>
</html>
