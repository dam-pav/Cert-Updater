<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Status Dashboard</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.15);
            --border: #475569;
            --status-valid: #22c55e;
            --status-expired: #ef4444;
            --status-unknown: #f59e0b;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .last-sync {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-secondary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.75rem;
            border: 1px solid var(--border);
        }

        .last-sync .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform 0.2s, border-color 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.35rem;
        }

        .stat-card .label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card.valid .number { color: var(--status-valid); }
        .stat-card.expired .number { color: var(--status-expired); }
        .stat-card.unknown .number { color: var(--status-unknown); }

        .table-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg-card);
        }

        th {
            padding: 1rem 1.25rem;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem 1.25rem;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(71, 85, 105, 0.4);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: rgba(56, 189, 248, 0.04);
        }

        .domain-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .host-tag {
            display: inline-block;
            background: var(--accent-glow);
            color: var(--accent);
            padding: 0.25rem 0.65rem;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 500;
        }

        .provider-badge {
            display: inline-block;
            background: rgba(167, 139, 250, 0.15);
            color: #a78bfa;
            padding: 0.25rem 0.65rem;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 500;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.75rem;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .status-badge.valid {
            background: rgba(34, 197, 94, 0.15);
            color: var(--status-valid);
        }

        .status-badge.expired {
            background: rgba(239, 68, 68, 0.15);
            color: var(--status-expired);
        }

        .status-badge.unknown {
            background: rgba(245, 158, 11, 0.15);
            color: var(--status-unknown);
        }

        .status-badge .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .status-badge.valid .status-dot { background: var(--status-valid); }
        .status-badge.expired .status-dot { background: var(--status-expired); }
        .status-badge.unknown .status-dot { background: var(--status-unknown); }

        .datetime {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-variant-numeric: tabular-nums;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            text-align: center;
            padding: 2rem;
            color: var(--status-expired);
            background: rgba(239, 68, 68, 0.08);
            border-radius: var(--radius);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        .refresh-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(56, 189, 248, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .refresh-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 24px rgba(56, 189, 248, 0.4);
        }

        .refresh-btn svg {
            width: 22px;
            height: 22px;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            th, td { padding: 0.75rem 0.75rem; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            table { font-size: 0.85rem; }
        }

        @media (max-width: 500px) {
            .hide-mobile { display: none; }
        }

        /* ── Menu & Editor Modal ── */
        .menu-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }

        .menu-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.2s, border-color 0.2s;
        }

        .menu-btn:hover {
            background: var(--bg-card);
            border-color: var(--accent);
        }

        .menu-btn svg {
            width: 18px;
            height: 18px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 100%;
            max-width: 900px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            display: flex;
            align-items: center;
        }

        .modal-close:hover {
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .modal-close svg {
            width: 20px;
            height: 20px;
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
        }

        .editor-toolbar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .editor-toolbar button {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            transition: background 0.2s, border-color 0.2s;
        }

        .editor-toolbar button:hover {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
        }

        .editor-toolbar button.primary {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
            font-weight: 600;
        }

        .editor-toolbar button.primary:hover {
            background: #7dd3fc;
        }

        .editor-toolbar button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .editor-wrapper {
            position: relative;
            width: 100%;
            min-height: 400px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
            /* Ensure consistent box model */
            -webkit-text-size-adjust: none;
            -moz-text-size-adjust: none;
            text-size-adjust: none;
        }

        .editor-wrapper:focus-within {
            border-color: var(--accent);
        }

        .editor-highlight {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            min-height: 400px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            padding: 1rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: transparent;
            pointer-events: none;
            overflow: auto;
            tab-size: 2;
            margin: 0;
            border: none;
            background: transparent;
            box-sizing: border-box;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .editor-highlight span {
            /* Only colored spans are visible; uncolored text stays transparent */
        }

        .editor-textarea {
            position: relative;
            width: 100%;
            min-height: 400px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            padding: 1rem;
            margin: 0;
            resize: vertical;
            outline: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            tab-size: 2;
            caret-color: var(--accent);
            z-index: 1;
            /* Remove default textarea styling */
            border-radius: 0;
            box-shadow: none;
            -webkit-appearance: none;
            appearance: none;
            box-sizing: border-box;
        }

        /* Syntax highlight colors */
        .hl-key-valid { color: #4ade80; }       /* green — valid schema key */
        .hl-val-valid { color: #86efac; }       /* light green — valid schema value */
        .hl-key-invalid { color: #f87171; }    /* red — invalid key */
        .hl-val-invalid { color: #fca5a5; }    /* red — invalid value */
        .hl-comment { color: #64748b; font-style: italic; } /* comments */
        .hl-string { color: #93c5fd; }           /* blue strings */
        .hl-anchor { color: #c084fc; }           /* purple YAML anchors/aliases */
        .hl-directive { color: #a78bfa; }        /* YAML directives */
        .hl-tag { color: #fbbf24; }              /* YAML tags */
        .hl-null { color: #f472b6; }             /* null values */
        .hl-bool { color: #fb923c; }             /* booleans */
        .hl-colon { color: var(--text-secondary); } /* colon separator */
        .hl-dash { color: var(--text-secondary); }  /* list dash */

        .validation-status {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
        }

        .validation-status.visible {
            display: block;
        }

        .validation-status.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--status-valid);
        }

        .validation-status.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--status-expired);
        }

        .validation-status .error-list {
            margin-top: 0.5rem;
            padding-left: 1.2rem;
        }

        .validation-status .error-list li {
            margin-bottom: 0.25rem;
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        .modal-footer button {
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .modal-footer .btn-cancel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .modal-footer .btn-cancel:hover {
            background: var(--bg-secondary);
        }

        .modal-footer .btn-save {
            background: var(--accent);
            border: 1px solid var(--accent);
            color: var(--bg-primary);
            font-weight: 600;
        }

        .modal-footer .btn-save:hover {
            background: #7dd3fc;
        }

        .modal-footer .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .loading-indicator .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 Certificate Status Dashboard</h1>
            <p>SSL/TLS certificate monitoring for all configured domains</p>
            <div class="last-sync" id="lastSync">
                <span class="dot"></span>
                <span>Loading...</span>
            </div>
        </header>

        <div class="menu-bar">
            <button class="menu-btn" onclick="openSettingsEditor()" title="Edit settings.yml">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                Edit Settings
            </button>
        </div>

        <div class="stats" id="stats"></div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Domain</th>
                        <th>Host</th>
                        <th class="hide-mobile">Provider</th>
                        <th>Status</th>
                        <th class="hide-mobile">Last Checked</th>
                        <th>Last Updated</th>
                        <th>Next Update</th>
                    </tr>
                </thead>
                <tbody id="domainTable">
                    <tr>
                        <td colspan="7">
                            <div class="loading">
                                <div class="spinner"></div>
                                Loading certificate status...
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Settings Editor Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>⚙️ Edit settings.yml</h2>
                <button class="modal-close" onclick="closeSettingsEditor()" title="Close">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M18 6 6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="editor-toolbar">
                    <button onclick="formatYaml()" title="Pretty-print YAML">Format</button>
                    <button onclick="copyEditorContent()" title="Copy to clipboard">Copy</button>
                    <button onclick="pasteEditorContent()" title="Paste from clipboard">Paste</button>
                    <button onclick="loadSettings()" id="reloadBtn">Reload</button>
                    <span id="editorStatus" style="margin-left:auto;"></span>
                </div>
                <div class="editor-wrapper" id="editorWrapper">
                    <pre class="editor-highlight" id="editorHighlight" aria-hidden="true"></pre>
                    <textarea class="editor-textarea" id="settingsEditor" spellcheck="false" placeholder="Loading settings.yml..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
                </div>
                <div class="validation-status" id="validationStatus"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeSettingsEditor()">Cancel</button>
                <button class="btn-save" id="saveBtn" onclick="saveSettings()" disabled>Save</button>
            </div>
        </div>
    </div>

    <button class="refresh-btn" onclick="loadStatus()" title="Refresh">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M4 4v5h5M20 20v-5h-5"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L4 4"/>
            <path d="M3.51 15a9 9 0 0 0 14.85 3.36L20 20"/>
        </svg>
    </button>

    <script>
        function formatDateTime(timestamp) {
            if (!timestamp) return '—';
            const d = new Date(timestamp + 'Z');
            if (isNaN(d)) return timestamp;
            return d.toLocaleString('en-US', {
                year: 'numeric', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false, timeZone: 'UTC'
            }) + ' UTC';
        }

        function updateStats(domains) {
            const stats = { total: domains.length, valid: 0, expired: 0, unknown: 0 };
            domains.forEach(d => { stats[d.status] = (stats[d.status] || 0) + 1; });

            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="number">${stats.total}</div><div class="label">Total</div></div>
                <div class="stat-card valid"><div class="number">${stats.valid}</div><div class="label">Valid</div></div>
                <div class="stat-card expired"><div class="number">${stats.expired}</div><div class="label">Expired</div></div>
                <div class="stat-card unknown"><div class="number">${stats.unknown}</div><div class="label">Unknown</div></div>
            `;
        }

        function renderTable(domains) {
            const tbody = document.getElementById('domainTable');

            if (!domains.length) {
                tbody.innerHTML = `
                    <tr><td colspan="7">
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                <path d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 5.25h9a2.25 2.25 0 0 0 2.25-2.25V8.25a2.25 2.25 0 0 0-2.25-2.25h-9a2.25 2.25 0 0 0-2.25 2.25v5.25a2.25 2.25 0 0 0 2.25 2.25Z"/>
                            </svg>
                            <p>No domains configured</p>
                        </div>
                    </td></tr>`;
                return;
            }

            tbody.innerHTML = domains.map(d => `
                <tr>
                    <td class="domain-name">${d.name}</td>
                    <td><span class="host-tag">${d.host || '—'}</span></td>
                    <td class="hide-mobile"><span class="provider-badge">${d.provider || '—'}</span></td>
                    <td><span class="status-badge ${d.status}"><span class="status-dot"></span>${d.status}</span></td>
                    <td class="datetime hide-mobile">${formatDateTime(d.last_checked)}</td>
                    <td class="datetime">${formatDateTime(d.last_updated)}</td>
                    <td class="datetime">${formatDateTime(d.next_update)}</td>
                </tr>
            `).join('');
        }

        async function loadStatus() {
            const btn = document.querySelector('.refresh-btn svg');
            btn.style.animation = 'spin 0.8s linear infinite';

            try {
                const res = await fetch('status.json?t=' + Date.now());
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                const syncEl = document.getElementById('lastSync');
                syncEl.innerHTML = `<span class="dot"></span><span>Last sync: ${formatDateTime(data.last_sync)}</span>`;

                updateStats(data.domains);
                renderTable(data.domains);
            } catch (err) {
                document.getElementById('domainTable').innerHTML = `
                    <tr><td colspan="7"><div class="error-msg">Failed to load status: ${err.message}<br><small>Ensure status.json is accessible at the same path as this page.</small></div></td></tr>`;
                document.getElementById('stats').innerHTML = '';
            } finally {
                btn.style.animation = '';
            }
        }

        loadStatus();
        setInterval(loadStatus, 60000);
    </script>

    <script>
    // ── JSON Schema for settings.yml validation ──
    const SETTINGS_SCHEMA = {
        type: "object",
        required: ["hosts", "domains"],
        properties: {
            hosts: {
                type: "object",
                additionalProperties: {
                    type: "object",
                    required: ["url", "reload"],
                    properties: {
                        url: { type: "string" },
                        transfer: { type: "string", enum: ["scp", "rsync"] },
                        reload: { type: "string" }
                    }
                }
            },
            domains: {
                type: "array",
                items: {
                    type: "object",
                    required: ["name", "keylength", "host", "dest"],
                    properties: {
                        name: { type: "string" },
                        keylength: { type: "string" },
                        dns: {
                            type: "object",
                            required: ["provider"],
                            properties: {
                                provider: { type: "string" },
                                env: { type: "object" }
                            }
                        },
                        host: { type: "string" },
                        dest: { type: "string" }
                    }
                }
            }
        }
    };

    // ── Simple YAML parser (subset for validation) ──
    // Uses js-yaml loaded from CDN for robust parsing
    let yamlLoaded = false;

    function loadYamlLibrary() {
        if (yamlLoaded) return Promise.resolve();
        return new Promise((resolve, reject) => {
            if (document.getElementById('js-yaml-script')) {
                yamlLoaded = true;
                resolve();
                return;
            }
            const script = document.createElement('script');
            script.id = 'js-yaml-script';
            script.src = 'https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js';
            script.onload = () => { yamlLoaded = true; resolve(); };
            script.onerror = () => reject(new Error('Failed to load YAML library'));
            document.head.appendChild(script);
        });
    }

    // ── Schema validation ──
    function validateAgainstSchema(data, schema, path = '') {
        const errors = [];

        // Type check
        if (schema.type) {
            const actualType = Array.isArray(data) ? 'array' : typeof data;
            if (actualType !== schema.type) {
                errors.push(`${path || 'root'}: expected ${schema.type}, got ${actualType}`);
                return errors;
            }
        }

        // Required fields
        if (schema.type === 'object' && schema.required && data) {
            for (const field of schema.required) {
                if (!(field in data)) {
                    errors.push(`${path ? path + '.' : ''}${field}: required field is missing`);
                }
            }
        }

        // Enum check
        if (schema.enum && data !== undefined && !schema.enum.includes(data)) {
            errors.push(`${path ? path + '.' : ''}root: value must be one of ${schema.enum.join(', ')}`);
        }

        // Properties validation
        if (schema.type === 'object' && schema.properties && data) {
            for (const [prop, propSchema] of Object.entries(schema.properties)) {
                if (prop in data) {
                    const subPath = path ? `${path}.${prop}` : prop;
                    const subErrors = validateAgainstSchema(data[prop], propSchema, subPath);
                    errors.push(...subErrors);
                }
            }
        }

        // Additional properties (hosts section)
        if (schema.type === 'object' && schema.additionalProperties && data) {
            const propSchema = schema.additionalProperties;
            for (const [key, value] of Object.entries(data)) {
                const subPath = path ? `${path}.${key}` : key;
                const subErrors = validateAgainstSchema(value, propSchema, subPath);
                errors.push(...subErrors);
            }
        }

        // Array items validation
        if (schema.type === 'array' && schema.items && Array.isArray(data)) {
            data.forEach((item, index) => {
                const subPath = `${path}[${index}]`;
                const subErrors = validateAgainstSchema(item, schema.items, subPath);
                errors.push(...subErrors);
            });
        }

        return errors;
    }

    function validateYamlContent(yamlText) {
        // Parse YAML
        let parsed;
        try {
            parsed = jsyaml.load(yamlText);
        } catch (e) {
            return { valid: false, errors: [`YAML parse error: ${e.message}`] };
        }

        if (parsed === null || typeof parsed !== 'object' || Array.isArray(parsed)) {
            return { valid: false, errors: ['Root element must be a YAML mapping (object)'] };
        }

        // Validate against schema
        const errors = validateAgainstSchema(parsed, SETTINGS_SCHEMA);

        return {
            valid: errors.length === 0,
            errors: errors
        };
    }

    // ── Syntax Highlighting ──
    // Build a set of all valid dotted paths from schema
    function getAllValidPaths(schema, prefix = '') {
        const validPaths = new Set();
        if (!schema.properties) return validPaths;
        for (const [key, propSchema] of Object.entries(schema.properties)) {
            const path = prefix ? `${prefix}.${key}` : key;
            validPaths.add(path);
            validPaths.add(key);
            validPaths.add(...getAllValidPaths(propSchema, path));
        }
        return validPaths;
    }

    // Get the schema node for a given dotted path
    function getSchemaAtPath(schema, path) {
        const parts = path.split('.');
        let current = schema;
        for (const part of parts) {
            if (current.properties && current.properties[part]) {
                current = current.properties[part];
            } else if (current.additionalProperties && typeof current.additionalProperties === 'object') {
                current = current.additionalProperties;
            } else {
                return null;
            }
        }
        return current;
    }

    // Escape HTML for safe insertion
    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Build a map of every YAML key → its parent path by scanning indentation
    // Returns { lineIndex: { keyName: parentDottedPath } }
    function buildKeyParentMap(lines, parsedData) {
        const keyParents = new Map(); // lineIndex → { keyName: parentPath }
        // Stack of { indent, path } for tracking context
        const stack = []; // each entry: { indent, path }

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (line.trim() === '' || line.trimStart().startsWith('#') || line.trimStart().startsWith('%')) continue;

            const indentLen = (line.match(/^(\s*)/)[1] || '').length;
            const content = line.slice(indentLen).trim();

            // Pop stack to find parent at shallower indent
            while (stack.length > 0 && stack[stack.length - 1].indent >= indentLen) {
                stack.pop();
            }

            const parentPath = stack.length > 0 ? stack[stack.length - 1].path : '';

            // Try to extract key name
            const keyMatch = content.match(/^((?:"[^"]*"|'[^']*'|[^:\[#\-/][^:]*)):\s*(.*)/);
            if (keyMatch) {
                const keyRaw = keyMatch[1];
                const keyClean = keyRaw.replace(/^["']|["']$/g, '');
                const val = keyMatch[2].trim();

                // Determine this key's dotted path
                const thisPath = parentPath ? `${parentPath}.${keyClean}` : keyClean;

                // Push onto stack
                stack.push({ indent: indentLen, path: thisPath });

                keyParents.set(i, { keyName: keyClean, keyRaw: keyRaw, parentPath: parentPath, thisPath: thisPath, value: val });
            } else if (content.startsWith('- ')) {
                // List item — parent is the array path
                stack.push({ indent: indentLen + 2, path: parentPath });
            }
        }

        return keyParents;
    }

    // Check if a key is defined in the schema at its parent level
    function isKeyInSchema(keyClean, parentPath) {
        let parentSchema;
        if (parentPath) {
            parentSchema = getSchemaAtPath(SETTINGS_SCHEMA, parentPath);
        } else {
            parentSchema = SETTINGS_SCHEMA;
        }

        if (!parentSchema) return false;

        // Check direct properties
        if (parentSchema.properties && parentSchema.properties[keyClean]) {
            return true;
        }

        // Check additionalProperties (for hosts section dynamic keys)
        if (parentSchema.additionalProperties) {
            const ap = parentSchema.additionalProperties;
            if (typeof ap === 'object' && ap.type === 'object') {
                return true; // dynamic keys are allowed under hosts
            }
        }

        return false;
    }

    // Check if a value violates schema constraints (e.g. enum)
    function isValueInvalid(keyClean, valStr, parentPath) {
        let parentSchema;
        if (parentPath) {
            parentSchema = getSchemaAtPath(SETTINGS_SCHEMA, parentPath);
        } else {
            parentSchema = SETTINGS_SCHEMA;
        }

        if (!parentSchema || !parentSchema.properties) return false;

        const keySchema = parentSchema.properties[keyClean];
        if (!keySchema) return false;

        if (keySchema.enum && !keySchema.enum.includes(valStr)) {
            return true;
        }

        return false;
    }

    // Highlight a single value token
    function highlightValue(val, isSchemaValue) {
        const escaped = escapeHtml(val);

        // Quoted strings
        if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) {
            return `<span class="hl-string">${escaped}</span>`;
        }

        // Null values
        if (/^(null|~|NULL)$/i.test(val)) {
            return `<span class="hl-null">${escaped}</span>`;
        }

        // Booleans
        if (/^(true|false|yes|no|on|off|TRUE|FALSE|YES|NO|ON|OFF)$/i.test(val)) {
            return `<span class="hl-bool">${escaped}</span>`;
        }

        // YAML anchors and aliases
        if (val.startsWith('&') || val.startsWith('*')) {
            return `<span class="hl-anchor">${escaped}</span>`;
        }

        // Tags
        if (val.startsWith('!')) {
            return `<span class="hl-tag">${escaped}</span>`;
        }

        // Regular values — only color green if it's a schema-defined value
        if (isSchemaValue) {
            return `<span class="hl-val-valid">${escaped}</span>`;
        }
        // Non-schema values: return unstyled (transparent in highlight layer)
        return escaped;
    }

    // Highlight a single line
    function highlightLine(line, keyInfoMap, lineIndex) {
        // Comments — render in gray
        if (line.trimStart().startsWith('#')) {
            return `<span class="hl-comment">${escapeHtml(line)}</span>`;
        }

        // Empty line
        if (line.trim() === '') {
            return '';
        }

        // YAML directives
        if (line.trimStart().startsWith('%')) {
            return `<span class="hl-directive">${escapeHtml(line)}</span>`;
        }

        const indentLen = (line.match(/^(\s*)/)[1] || '').length;
        const content = line.slice(indentLen);

        // Get key info for this line
        const keyInfo = keyInfoMap.get(lineIndex);

        // Build result: start with transparent indent
        let result = escapeHtml(' '.repeat(indentLen));

        if (keyInfo) {
            const { keyRaw, keyClean, parentPath, thisPath, value } = keyInfo;

            // Check if key is in schema
            const keyInSchema = isKeyInSchema(keyClean, parentPath);
            const valInvalid = isValueInvalid(keyClean, value, parentPath);

            // Highlight key
            if (keyInSchema) {
                result += `<span class="hl-key-valid">${escapeHtml(keyRaw)}</span>`;
            } else {
                result += `<span class="hl-key-invalid">${escapeHtml(keyRaw)}</span>`;
            }

            // Colon separator (gray, visible)
            result += `<span class="hl-colon">: </span>`;

            // Highlight value
            if (value) {
                if (valInvalid) {
                    result += `<span class="hl-val-invalid">${escapeHtml(value)}</span>`;
                } else if (keyInSchema) {
                    result += highlightValue(value, true);
                } else {
                    // Non-schema key's value — leave transparent (not visible in highlight layer)
                    result += escapeHtml(value);
                }
            }
        } else {
            // No key info — could be a list item continuation or other
            if (content.startsWith('- ')) {
                result += `<span class="hl-dash">- </span>`;
                const rest = content.slice(2);
                // Check for nested key-value in list item
                const nestedKv = rest.match(/^((?:"[^"]*"|'[^']*'|[^:\[#\-/][^:]*)):\s*(.*)/);
                if (nestedKv) {
                    const nKey = nestedKv[1];
                    const nVal = nestedKv[2].trim();
                    // List item keys are typically schema-defined (domain entries)
                    result += `<span class="hl-key-valid">${escapeHtml(nKey)}</span>`;
                    result += `<span class="hl-colon">: </span>`;
                    if (nVal) {
                        result += highlightValue(nVal, true);
                    }
                } else {
                    // Plain list value — leave transparent
                    result += escapeHtml(rest);
                }
            } else {
                // Fallback: leave transparent
                result += escapeHtml(content);
            }
        }

        return result;
    }

    // Main highlight function — rebuilds the entire highlighted view
    function updateHighlighting() {
        const editor = document.getElementById('settingsEditor');
        const highlight = document.getElementById('editorHighlight');
        const text = editor.value;

        // Parse YAML for context
        let parsedData = null;
        try {
            parsedData = jsyaml.load(text);
        } catch (e) {
            // If YAML is invalid, still do basic highlighting
        }

        const lines = text.split('\n');

        // Build key→parent map once
        const keyParentMap = buildKeyParentMap(lines, parsedData);

        // Highlight each line
        const highlighted = lines.map((line, idx) => highlightLine(line, keyParentMap, idx)).join('\n');

        highlight.innerHTML = highlighted + '\n';

        // Sync scroll
        highlight.scrollTop = editor.scrollTop;
        highlight.scrollLeft = editor.scrollLeft;
    }

    // Sync scroll between textarea and highlight layer
    function syncScroll() {
        const editor = document.getElementById('settingsEditor');
        const highlight = document.getElementById('editorHighlight');
        highlight.scrollTop = editor.scrollTop;
        highlight.scrollLeft = editor.scrollLeft;
    }

    // ── Editor functions ──
    async function openSettingsEditor() {
        await loadYamlLibrary();
        const modal = document.getElementById('settingsModal');
        modal.classList.add('active');
        await loadSettings();
    }

    function closeSettingsEditor() {
        const modal = document.getElementById('settingsModal');
        modal.classList.remove('active');
        clearValidationStatus();
    }

    async function loadSettings() {
        const editor = document.getElementById('settingsEditor');
        const status = document.getElementById('editorStatus');
        const saveBtn = document.getElementById('saveBtn');

        status.innerHTML = '<span class="loading-indicator"><span class="spinner"></span>Loading...</span>';
        saveBtn.disabled = true;

        try {
            const res = await fetch('/api/settings/read');
            if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
            const content = await res.text();
            editor.value = content;
            updateHighlighting();
            status.innerHTML = '<span style="color: var(--status-valid);">✓ Loaded</span>';
            validateAndEnableSave();
        } catch (err) {
            status.innerHTML = `<span style="color: var(--status-expired);">✗ ${err.message}</span>`;
            editor.value = '# Error loading settings.yml\n# ' + err.message;
        }
    }

    async function saveSettings() {
        const editor = document.getElementById('settingsEditor');
        const saveBtn = document.getElementById('saveBtn');
        const status = document.getElementById('editorStatus');

        // Validate before saving
        const validation = validateYamlContent(editor.value);
        if (!validation.valid) {
            showValidationStatus(validation.errors, false);
            return;
        }

        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';
        status.innerHTML = '<span class="loading-indicator"><span class="spinner"></span>Saving...</span>';

        try {
            const res = await fetch('/api/settings/write', {
                method: 'POST',
                headers: { 'Content-Type': 'text/yaml' },
                body: editor.value
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.error || `HTTP ${res.status}`);
            }

            showValidationStatus([data.message || 'Settings saved successfully!'], true);
            status.innerHTML = '<span style="color: var(--status-valid);">✓ Saved</span>';

            // Reload the dashboard data
            setTimeout(() => {
                loadStatus();
            }, 500);
        } catch (err) {
            showValidationStatus([err.message], false);
            status.innerHTML = `<span style="color: var(--status-expired);">✗ Save failed</span>`;
        } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save';
        }
    }

    function validateAndEnableSave() {
        const editor = document.getElementById('settingsEditor');
        const saveBtn = document.getElementById('saveBtn');

        // Update syntax highlighting
        updateHighlighting();

        // Quick validation: must parse as YAML and have hosts + domains
        try {
            const parsed = jsyaml.load(editor.value);
            if (parsed && typeof parsed === 'object' && !Array.isArray(parsed) &&
                'hosts' in parsed && 'domains' in parsed) {
                saveBtn.disabled = false;
            } else {
                saveBtn.disabled = true;
            }
        } catch {
            saveBtn.disabled = true;
        }
    }

    function showValidationStatus(messages, isSuccess) {
        const el = document.getElementById('validationStatus');
        el.className = `validation-status visible ${isSuccess ? 'success' : 'error'}`;

        if (isSuccess) {
            el.innerHTML = messages.map(m => `<div>✓ ${m}</div>`).join('');
        } else {
            el.innerHTML = `<div>✗ Validation failed</div><ul class="error-list">${messages.map(m => `<li>${m}</li>`).join('')}</ul>`;
        }
    }

    function clearValidationStatus() {
        const el = document.getElementById('validationStatus');
        el.className = 'validation-status';
        el.innerHTML = '';
    }

    function formatYaml() {
        const editor = document.getElementById('settingsEditor');
        try {
            const parsed = jsyaml.load(editor.value);
            editor.value = jsyaml.dump(parsed, {
                indent: 2,
                lineWidth: 120,
                noRefs: true,
                quotingType: '"',
                forceQuotes: false
            });
            validateAndEnableSave();
        } catch (e) {
            alert('Cannot format: invalid YAML\n' + e.message);
        }
    }

    async function copyEditorContent() {
        const editor = document.getElementById('settingsEditor');
        try {
            await navigator.clipboard.writeText(editor.value);
            const status = document.getElementById('editorStatus');
            status.innerHTML = '<span style="color: var(--status-valid);">✓ Copied</span>';
            setTimeout(() => { status.innerHTML = ''; }, 2000);
        } catch {
            // Fallback
            editor.select();
            document.execCommand('copy');
        }
    }

    async function pasteEditorContent() {
        try {
            const text = await navigator.clipboard.readText();
            const editor = document.getElementById('settingsEditor');
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            editor.value = editor.value.substring(0, start) + text + editor.value.substring(end);
            editor.selectionStart = editor.selectionEnd = start + text.length;
            editor.focus();
            validateAndEnableSave();
        } catch {
            alert('Cannot paste: clipboard access denied. Use Ctrl+V directly.');
        }
    }

    // Close modal on overlay click
    document.getElementById('settingsModal').addEventListener('click', function(e) {
        if (e.target === this) closeSettingsEditor();
    });

    // Close modal on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const modal = document.getElementById('settingsModal');
            if (modal.classList.contains('active')) closeSettingsEditor();
        }
        // Tab support in textarea
        if (e.key === 'Tab' && document.activeElement.id === 'settingsEditor') {
            e.preventDefault();
            const editor = document.activeElement;
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
            editor.selectionStart = editor.selectionEnd = start + 2;
        }
    });

    // Validate on content change
    document.getElementById('settingsEditor').addEventListener('input', function() {
        validateAndEnableSave();
    });

    // Sync scroll on scroll
    document.getElementById('settingsEditor').addEventListener('scroll', syncScroll);
    </script>
</body>
</html>
