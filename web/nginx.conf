server {
    listen 80;
    server_name _;

    # Static web content (from Docker build)
    root /usr/share/nginx/html;
    index index.html;

    # Dynamic content from volume mount (status.json, cert files)
    set $dynamic_root /usr/share/nginx/html/export;

    # Serve index.html for /
    location = / {
        try_files /index.html =404;
    }

    # Serve status.json from the export directory (dynamic content)
    location = /status.json {
        alias $dynamic_root/status.json;
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        expires -1;
    }

    # Serve all other files - try static first, then dynamic export directory
    location / {
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
}
