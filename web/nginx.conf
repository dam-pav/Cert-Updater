server {
    listen 80;
    server_name _;

    # Static web content (from Docker build)
    root /usr/share/nginx/html;
    index index.html;

    # Serve index.html for /
    location = / {
        try_files /index.html =404;
    }

    location ~ ^/(.+/)?(index\.html|settings\.schema\.json|dam-pav\.logo\.svg)$ {
        try_files /$2 =404;
    }

    # Authenticated status API. Kept at /status.json for dashboard compatibility.
    location = /status.json {
        proxy_pass http://cert-updater:8081;
        proxy_set_header Authorization $http_authorization;
    }

    location = /api/status {
        proxy_pass http://cert-updater:8081;
        proxy_set_header Authorization $http_authorization;
    }

    location = /api/auth/me {
        proxy_pass http://cert-updater:8081;
        proxy_set_header Authorization $http_authorization;
    }

    location = /api/users {
        proxy_pass http://cert-updater:8081;
        proxy_set_header Authorization $http_authorization;
    }

    location = /api/hosts {
        proxy_pass http://cert-updater:8081;
        proxy_set_header Authorization $http_authorization;
    }

    location = /api/config {
        proxy_pass http://cert-updater:8081;
        proxy_set_header Authorization $http_authorization;
    }

    location = /api/users/write {
        limit_except POST { deny all; }
        proxy_pass http://cert-updater:8081;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Content-Type $content_type;
    }

    location = /api/ssh/public-key {
        proxy_pass http://cert-updater:8081;
        proxy_set_header Authorization $http_authorization;
    }

    # Settings API - admin-only read settings.yml
    location = /api/settings/read {
        proxy_pass http://cert-updater:8081;
        proxy_set_header Authorization $http_authorization;
    }

    # Settings API - admin-only write settings.yml via proxy to internal script
    location = /api/settings/write {
        limit_except POST { deny all; }
        proxy_pass http://cert-updater:8081;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Content-Type $content_type;
    }

    # Subpath deployments where a reverse proxy preserves the prefix, e.g.
    # /cert-updater/api/status -> /api/status.
    location ~ ^/(.+/)?api/(auth/me|status|users|hosts|config|users/write|ssh/public-key|settings/read|settings/write)$ {
        rewrite ^/(.+/)?api/(.*)$ /api/$2 last;
    }

    # Serve all other files - try static first, then dynamic export directory
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
}
