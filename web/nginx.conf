server {
    listen 80;
    server_name _;

    # Static web content (from Docker build)
    root /usr/share/nginx/html;
    index index.html;

    # Dynamic content from volume mount (status.json, cert files)
    set $dynamic_root /usr/share/nginx/html/export;

    # Serve index.html for /
    location = / {
        try_files /index.html =404;
    }

    # Serve status.json from the export directory (dynamic content)
    location = /status.json {
        alias $dynamic_root/status.json;
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        expires -1;
    }

    # Settings API - read settings.yml
    location = /api/settings/read {
        alias /cert-updater/config/settings.yml;
        default_type text/yaml;
        add_header Access-Control-Allow-Origin *;
    }

    # Settings API - write settings.yml via proxy to internal script
    location = /api/settings/write {
        limit_except POST { deny all; }
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "POST";
        add_header Access-Control-Allow-Headers "Content-Type";

        # Return CORS preflight for cross-origin requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "POST";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Access-Control-Max-Age 3600;
            return 204;
        }

        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Content-Type $content_type;
    }

    # Serve all other files - try static first, then dynamic export directory
    location / {
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
}
